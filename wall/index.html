<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Grid Size - JB Customizer</title>
    <link rel="icon" type="image/png" sizes="16x16" href="assets/loading-wheel.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/loading-wheel.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Basic styling for the homepage (Unchanged) */
        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }
        .selector-container {
            margin-top: 30px;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        label {
            margin-right: 10px;
            font-weight: 600;
        }
        select {
            padding: 8px 12px;
            min-width: 150px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer; /* Added cursor */
        }
        button {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #1a2d5a;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1em;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #003f87;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<img src="assets/loading-wheel.png" alt="Jersey Blanket Logo" style="width: 200px; margin-bottom: 20px;"> <!-- Replace with your logo URL -->
    <h1>Welcome to the Jersey Blanket Customizer</h1>

    <div class="selector-container">
        <label for="grid-size-selector">Select Grid Size:</label>
        <select id="grid-size-selector">
            <option value="">-- Please Choose --</option>
            <option value="2x3">2 x 3 (6 Squares)</option>
            <option value="3x3">3 x 3 (9 Squares)</option>
            <option value="3x4">3 x 4 (12 Squares)</option>
            <option value="4x3">4 x 3 (12 Squares)</option>
            <option value="4x4" selected>4 x 4 (16 Squares)</option>
            <option value="4x5">4 x 5 (20 Squares)</option>
            <option value="4x6">4 x 6 (24 Squares)</option>
            <option value="5x5">5 x 5 (25 Squares)</option>
            <option value="5x6">5 x 6 (30 Squares)</option> 
            <option value="6x6">6 x 6 (36 Squares)</option>
            <option value="7x7">7 x 7 (49 Squares)</option>
        </select>

        <br>
        <button id="go-to-grid-btn">Customize Grid</button>
    </div>

    <script>
        // JavaScript unchanged
        const selector = document.getElementById('grid-size-selector');
        const button = document.getElementById('go-to-grid-btn');
        // Make sure this matches your grid page filename
        const customizerPage = 'grid.html';

        // Initially disable button if no selection
        button.disabled = selector.value === "";

        selector.addEventListener('change', () => {
            // Enable/disable button based on selection
            button.disabled = selector.value === "";
        });

        button.addEventListener('click', () => {
            const selectedSize = selector.value;

            if (selectedSize) {
                // Construct the URL with the size as a query parameter
                // Example: grid.html?size=4x4
                const targetUrl = `${customizerPage}?size=${encodeURIComponent(selectedSize)}`;

                // Navigate to the customizer page
                window.location.href = targetUrl;
            }
        });
    </script>

</body>
</html>
